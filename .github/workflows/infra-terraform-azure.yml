# -------------------------------------------------------------------
# Terraform Plan / Apply for AppVault Azure Infrastructure
# -------------------------------------------------------------------
# Manual trigger only — select target environment when dispatching.
# -------------------------------------------------------------------
name: "Infrastructure — Azure Terraform"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, stg, uat, prod]

permissions:
  id-token: write   # OIDC token for Azure login
  contents: read
  pull-requests: write  # Comment plan output on PRs

env:
  TF_WORKING_DIR: iac-azure
  TF_VERSION: "1.9.0"
  ARM_USE_OIDC: true

jobs:
  # ----------------------------------------------------------------
  # Terraform Plan
  # ----------------------------------------------------------------
  plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exitcode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          terraform plan \
            -var-file="environments/${ENV}.tfvars" \
            -out=tfplan \
            -detailed-exitcode \
            -input=false
        continue-on-error: true

      - name: Upload Plan Artifact
        if: steps.plan.outputs.exitcode == 2
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment || 'dev' }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const plan = execSync(
              'cd ${{ env.TF_WORKING_DIR }} && terraform show -no-color tfplan'
            ).toString().slice(0, 60000);

            const body = `### Terraform Plan — \`${{ github.event.inputs.environment || 'dev' }}\`
            \`\`\`
            ${plan}
            \`\`\`
            *Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail on Plan Error
        if: steps.plan.outputs.exitcode == 1
        run: exit 1

  # ----------------------------------------------------------------
  # Terraform Apply (main branch only, requires approval)
  # ----------------------------------------------------------------
  apply:
    name: "Terraform Apply"
    needs: plan
    if: github.ref == 'refs/heads/main' && needs.plan.outputs.plan_exit_code == 2
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment || 'dev' }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -input=false tfplan
