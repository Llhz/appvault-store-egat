name: E2E Tests - Playwright

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build application
        run: mvn clean package --batch-mode -DskipTests

      - name: Start application
        run: |
          java -Xmx512m -Xms256m -jar target/appvault-0.0.1-SNAPSHOT.jar &
          echo "Waiting for application to start..."
          for i in $(seq 1 60); do
            if curl -s http://localhost:8080 > /dev/null 2>&1; then
              echo "Application is ready"
              break
            fi
            sleep 2
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright dependencies
        working-directory: e2e-playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium firefox webkit

      - name: Run Playwright tests
        id: playwright
        working-directory: e2e-playwright
        run: npx playwright test --reporter=list,html 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | tee playwright-output.txt
        env:
          CI: true
          FORCE_COLOR: 0

      - name: Write test summary
        if: always()
        working-directory: e2e-playwright
        run: |
          echo '## 🎭 Playwright E2E Test Results' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          if [ '${{ steps.playwright.outcome }}' = 'success' ]; then
            echo '✅ **All tests passed**' >> $GITHUB_STEP_SUMMARY
          else
            echo '❌ **Some tests failed**' >> $GITHUB_STEP_SUMMARY
          fi
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '<details><summary>Full test output</summary>' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat playwright-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '</details>' >> $GITHUB_STEP_SUMMARY

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e-playwright/playwright-report
          retention-days: 7

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: e2e-playwright/test-results
          retention-days: 7
