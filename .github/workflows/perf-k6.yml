name: Performance Tests - k6

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  k6:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build application
        run: mvn clean package --batch-mode -DskipTests

      - name: Start application
        run: |
          java -Xmx512m -Xms256m -jar target/appvault-0.0.1-SNAPSHOT.jar &
          echo "Waiting for application to start..."
          for i in $(seq 1 60); do
            if curl -s http://localhost:8080 > /dev/null 2>&1; then
              echo "Application is ready"
              break
            fi
            sleep 2
          done

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Create output directory
        run: mkdir -p test-logs

      - name: Run smoke test
        env:
          K6_NO_COLOR: 1
        run: k6 run perf-k6/smoke-test.js --out json=test-logs/k6-smoke-results.json 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | tee test-logs/k6-smoke-output.txt

      - name: Run load test (CI-safe)
        env:
          K6_NO_COLOR: 1
        run: |
          k6 run perf-k6/load-test.js \
            --out json=test-logs/k6-load-results.json \
            --stage '15s:5,30s:5,15s:10,30s:10,15s:0' 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | tee test-logs/k6-load-output.txt

      - name: Run auth flow test
        env:
          K6_NO_COLOR: 1
        run: k6 run perf-k6/auth-flow-test.js --out json=test-logs/k6-auth-results.json 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | tee test-logs/k6-auth-output.txt

      - name: Run admin analytics test
        env:
          K6_NO_COLOR: 1
        run: k6 run perf-k6/admin-analytics-test.js --out json=test-logs/k6-admin-results.json 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | tee test-logs/k6-admin-output.txt

      - name: Run stress test (CI-safe)
        env:
          K6_NO_COLOR: 1
        run: |
          k6 run perf-k6/stress-test.js \
            --out json=test-logs/k6-stress-results.json \
            --stage '30s:15,1m:15,30s:30,1m:30,30s:0' 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | tee test-logs/k6-stress-output.txt

      - name: Write performance summary
        if: always()
        run: |
          echo '## ⚡ k6 Performance Test Results' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          for test in smoke load auth admin stress; do
            file="test-logs/k6-${test}-output.txt"
            if [ -f "$file" ]; then
              echo "### ${test} test" >> $GITHUB_STEP_SUMMARY
              echo '' >> $GITHUB_STEP_SUMMARY
              echo '<details><summary>View results</summary>' >> $GITHUB_STEP_SUMMARY
              echo '' >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              cat "$file" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo '</details>' >> $GITHUB_STEP_SUMMARY
              echo '' >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: |
            test-logs/k6-*.json
            test-logs/k6-*-output.txt
          retention-days: 7
