name: E2E Tests - Cypress

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  cypress:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build application
        run: mvn clean package --batch-mode -DskipTests

      - name: Start application
        run: |
          java -jar target/appvault-0.0.1-SNAPSHOT.jar &
          echo "Waiting for application to start..."
          for i in $(seq 1 60); do
            if curl -s http://localhost:8080 > /dev/null 2>&1; then
              echo "Application is ready"
              break
            fi
            sleep 2
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cypress dependencies
        working-directory: e2e-cypress
        run: |
          npm ci
          npm install --save-dev mochawesome mochawesome-merge mochawesome-report-generator

      - name: Run Cypress tests
        id: cypress
        working-directory: e2e-cypress
        env:
          NO_COLOR: 1
        run: |
          npx cypress run \
            --reporter mochawesome \
            --reporter-options reportDir=cypress/reports/json,overwrite=false,html=false,json=true \
            2>&1 | sed 's/\x1b\[[0-9;]*m//g' | tee cypress-output.txt

      - name: Generate HTML report
        if: always()
        working-directory: e2e-cypress
        run: |
          npx mochawesome-merge cypress/reports/json/*.json -o cypress/reports/merged.json
          npx marge cypress/reports/merged.json --reportDir cypress/reports/html --inline

      - name: Write test summary
        if: always()
        working-directory: e2e-cypress
        run: |
          echo '## 🧪 Cypress E2E Test Results' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          if [ '${{ steps.cypress.outcome }}' = 'success' ]; then
            echo '✅ **All tests passed**' >> $GITHUB_STEP_SUMMARY
          else
            echo '❌ **Some tests failed**' >> $GITHUB_STEP_SUMMARY
          fi
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '<details><summary>Full test output</summary>' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat cypress-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '</details>' >> $GITHUB_STEP_SUMMARY

      - name: Upload Cypress screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: e2e-cypress/cypress/screenshots
          retention-days: 7

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: e2e-cypress/cypress/videos
          retention-days: 7

      - name: Upload Cypress HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-html-report
          path: e2e-cypress/cypress/reports/html
          retention-days: 7
