name: E2E Tests - Robot Framework

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  robot:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build application
        run: mvn clean package --batch-mode -DskipTests

      - name: Start application
        run: |
          java -Xmx512m -Xms256m -jar target/appvault-0.0.1-SNAPSHOT.jar &
          echo "Waiting for application to start..."
          for i in $(seq 1 60); do
            if curl -s http://localhost:8080 > /dev/null 2>&1; then
              echo "Application is ready"
              break
            fi
            sleep 2
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Robot Framework dependencies
        working-directory: e2e-robot
        run: |
          pip install -r requirements.txt
          rfbrowser init

      - name: Run Robot Framework tests
        id: robot
        working-directory: e2e-robot
        run: |
          robot \
            --outputdir results \
            --loglevel INFO \
            tests/ 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | tee robot-output.txt

      - name: Write test summary
        if: always()
        working-directory: e2e-robot
        run: |
          echo '## 🤖 Robot Framework E2E Test Results' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          if [ '${{ steps.robot.outcome }}' = 'success' ]; then
            echo '✅ **All tests passed**' >> $GITHUB_STEP_SUMMARY
          else
            echo '❌ **Some tests failed**' >> $GITHUB_STEP_SUMMARY
          fi
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '<details><summary>Full test output</summary>' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat robot-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '</details>' >> $GITHUB_STEP_SUMMARY

      - name: Upload Robot Framework results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: e2e-robot/results
          retention-days: 7
