apiVersion: v1
kind: Namespace
metadata:
  name: appvault
  labels:
    app.kubernetes.io/part-of: appvault-store
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: appvault-store
  namespace: appvault
  annotations:
    azure.workload.identity/client-id: "${WORKLOAD_IDENTITY_CLIENT_ID}"
  labels:
    azure.workload.identity/use: "true"
    app.kubernetes.io/name: appvault-store
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: appvault-keyvault
  namespace: appvault
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "${WORKLOAD_IDENTITY_CLIENT_ID}"
    keyvaultName: "${KEY_VAULT_NAME}"
    objects: |
      array:
        - |
          objectName: app-admin-password
          objectType: secret
        - |
          objectName: app-spring-profiles
          objectType: secret
    tenantId: "${AZURE_TENANT_ID}"
  secretObjects:
    - secretName: appvault-secrets
      type: Opaque
      data:
        - objectName: app-admin-password
          key: ADMIN_PASSWORD
        - objectName: app-spring-profiles
          key: SPRING_PROFILES_ACTIVE
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: appvault-store
  namespace: appvault
  labels:
    app.kubernetes.io/name: appvault-store
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: appvault-store
  template:
    metadata:
      labels:
        app.kubernetes.io/name: appvault-store
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: appvault-store
      containers:
        - name: appvault-store
          image: "${ACR_LOGIN_SERVER}/appvault/appvault-store:latest"
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                secretKeyRef:
                  name: appvault-secrets
                  key: SPRING_PROFILES_ACTIVE
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: appvault-keyvault
---
apiVersion: v1
kind: Service
metadata:
  name: appvault-store
  namespace: appvault
  labels:
    app.kubernetes.io/name: appvault-store
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: appvault-store
