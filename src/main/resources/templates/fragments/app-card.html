<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="appCard(app, size)" class="app-card" th:classappend="${size == 'small' ? 'app-card-sm' : ''}">
    <a th:href="@{/app/{id}(id=${app.id})}" class="text-decoration-none">
        <div class="d-flex align-items-center gap-3 p-3">
            <img th:src="${app.iconUrl != null ? app.iconUrl : 'https://placehold.co/80x80/007AFF/white?text=' + app.name.substring(0,1)}"
                 th:alt="${app.name}"
                 class="app-icon app-icon-md flex-shrink-0"/>
            <div class="flex-grow-1 min-width-0">
                <div class="fw-semibold text-dark text-truncate" th:text="${app.name}">App Name</div>
                <div class="text-secondary small text-truncate" th:text="${app.category != null ? app.category.name : ''}">Category</div>
                <div class="d-flex align-items-center gap-1 mt-1">
                    <span class="star-rating small">
                        <span th:each="i : ${#numbers.sequence(1,5)}">
                            <i class="fa-solid fa-star" th:if="${i <= app.rating}"></i>
                            <i class="fa-regular fa-star" th:unless="${i <= app.rating}"></i>
                        </span>
                    </span>
                    <span class="text-secondary small" th:text="${app.reviewCount}">0</span>
                </div>
            </div>
            <div class="flex-shrink-0">
                <span th:if="${app.price != null and app.price.compareTo(T(java.math.BigDecimal).ZERO) == 0}"
                      class="btn-get">GET</span>
                <span th:unless="${app.price != null and app.price.compareTo(T(java.math.BigDecimal).ZERO) == 0}"
                      class="btn-price" th:text="'$' + ${#numbers.formatDecimal(app.price, 1, 2)}">$0.99</span>
            </div>
        </div>
    </a>
</div>
