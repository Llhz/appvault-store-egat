<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="fragments/header :: head('Browse Apps')"></head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<main style="padding-top: 70px;">
    <div class="container py-4">
        <!-- Page Title -->
        <div class="mb-4">
            <h1 class="page-title" th:text="${currentCategory != null ? currentCategory.name : 'Browse All Apps'}">Browse All Apps</h1>
            <p class="text-secondary" th:text="${apps.totalElements} + ' apps available'">0 apps</p>
        </div>

        <!-- Filter / Sort Bar -->
        <div class="d-flex flex-wrap gap-3 align-items-center mb-4 p-3 bg-white rounded-3 shadow-sm">
            <div class="d-flex gap-2 flex-wrap">
                <a th:href="@{/browse}" th:class="${categoryId == null ? 'category-pill active' : 'category-pill'}">All</a>
                <a th:each="cat : ${categories}"
                   th:href="@{/browse/category/{id}(id=${cat.id})}"
                   th:class="${currentCategory != null and currentCategory.id == cat.id ? 'category-pill active' : 'category-pill'}"
                   th:text="${cat.name}">Category</a>
            </div>
            <div class="ms-auto">
                <form th:action="${categoryId != null ? '/browse/category/' + categoryId : '/browse'}" method="get" class="d-flex align-items-center gap-2">
                    <label class="text-secondary small fw-semibold">Sort:</label>
                    <select name="sort" class="form-select form-select-sm rounded-pill" style="width: auto;" onchange="this.form.submit()">
                        <option value="rating" th:selected="${currentSort == 'rating'}">Top Rated</option>
                        <option value="newest" th:selected="${currentSort == 'newest'}">Newest</option>
                        <option value="name" th:selected="${currentSort == 'name'}">Name A-Z</option>
                        <option value="price-low" th:selected="${currentSort == 'price-low'}">Price: Low to High</option>
                        <option value="price-high" th:selected="${currentSort == 'price-high'}">Price: High to Low</option>
                    </select>
                </form>
            </div>
        </div>

        <!-- Apps Grid -->
        <div class="row g-3 mb-4" th:if="${!apps.isEmpty()}">
            <div th:each="app : ${apps}" class="col-sm-6 col-md-4 col-lg-3">
                <a th:href="@{/app/{id}(id=${app.id})}" class="text-decoration-none h-100">
                    <div class="app-card-grid h-100">
                        <img th:src="${app.iconUrl != null ? app.iconUrl : 'https://placehold.co/64x64/007AFF/white?text=A'}"
                             th:alt="${app.name}" class="app-icon-md mb-3 d-block mx-auto"/>
                        <div class="fw-semibold text-dark text-truncate mb-1" th:text="${app.name}">App Name</div>
                        <div class="text-secondary small text-truncate mb-1" th:text="${app.developer}">Developer</div>
                        <div class="d-flex align-items-center gap-1 mb-2">
                            <span class="star-rating-sm">
                                <span th:each="i : ${#numbers.sequence(1,5)}">
                                    <i class="fa-solid fa-star" th:if="${i <= app.rating}"></i>
                                    <i class="fa-regular fa-star" th:unless="${i <= app.rating}"></i>
                                </span>
                            </span>
                            <span class="text-secondary small" th:text="${app.reviewCount}">0</span>
                        </div>
                        <div class="text-muted small two-line-clamp mb-3" th:text="${app.subtitle}"></div>
                        <div class="mt-auto">
                            <span th:if="${app.price != null and app.price.compareTo(T(java.math.BigDecimal).ZERO) == 0}"
                                  class="btn-get">GET</span>
                            <span th:unless="${app.price != null and app.price.compareTo(T(java.math.BigDecimal).ZERO) == 0}"
                                  class="btn-price" th:text="'$' + ${#numbers.formatDecimal(app.price, 1, 2)}">$4.99</span>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <!-- Empty state -->
        <div th:if="${apps.isEmpty()}" class="text-center py-5">
            <i class="fa-solid fa-box-open fa-4x text-secondary mb-3"></i>
            <h3>No apps found</h3>
            <p class="text-secondary">Try a different category or sort option.</p>
        </div>

        <!-- Pagination -->
        <nav th:if="${apps.totalPages > 1}" class="mt-4 d-flex justify-content-center">
            <ul class="pagination">
                <li class="page-item" th:classappend="${!apps.hasPrevious() ? 'disabled' : ''}">
                    <a class="page-link rounded-pill me-1"
                       th:href="@{/browse(page=${apps.number - 1}, categoryId=${categoryId}, sort=${currentSort})}">
                        &laquo; Prev
                    </a>
                </li>
                <li th:each="i : ${#numbers.sequence(0, apps.totalPages - 1)}"
                    class="page-item" th:classappend="${apps.number == i ? 'active' : ''}">
                    <a class="page-link rounded-pill mx-1"
                       th:href="@{/browse(page=${i}, categoryId=${categoryId}, sort=${currentSort})}"
                       th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${!apps.hasNext() ? 'disabled' : ''}">
                    <a class="page-link rounded-pill ms-1"
                       th:href="@{/browse(page=${apps.number + 1}, categoryId=${categoryId}, sort=${currentSort})}">
                        Next &raquo;
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</main>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
