<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('Search Results')"></head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<main style="padding-top: 70px;">
    <div class="container py-4">
        <div class="mb-4">
            <h1 class="page-title" th:if="${query != null and !query.isEmpty()}">
                Results for "<span th:text="${query}"></span>"
            </h1>
            <h1 class="page-title" th:if="${query == null or query.isEmpty()}">Search Apps</h1>
            <p class="text-secondary" th:text="${apps.totalElements} + ' results found'">0 results</p>
        </div>

        <!-- Search form -->
        <form th:action="@{/search}" method="get" class="mb-4">
            <div class="search-bar-container position-relative" style="max-width: 500px;">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input class="form-control search-bar" type="search" name="q"
                       th:value="${query}" placeholder="Search apps..." autofocus/>
            </div>
        </form>

        <!-- Results Grid -->
        <div class="row g-3 mb-4" th:if="${!apps.isEmpty()}">
            <div th:each="app : ${apps}" class="col-sm-6 col-md-4 col-lg-3">
                <a th:href="@{/app/{id}(id=${app.id})}" class="text-decoration-none h-100">
                    <div class="app-card-grid h-100">
                        <img th:src="${app.iconUrl != null ? app.iconUrl : 'https://placehold.co/64x64/007AFF/white?text=A'}"
                             th:alt="${app.name}" class="app-icon-md mb-3 d-block mx-auto"/>
                        <div class="fw-semibold text-dark text-truncate mb-1" th:text="${app.name}">App</div>
                        <div class="text-secondary small text-truncate mb-1" th:text="${app.developer}">Dev</div>
                        <div class="d-flex align-items-center gap-1 mb-2">
                            <span class="star-rating-sm">
                                <span th:each="i : ${#numbers.sequence(1,5)}">
                                    <i class="fa-solid fa-star" th:if="${i <= app.rating}"></i>
                                    <i class="fa-regular fa-star" th:unless="${i <= app.rating}"></i>
                                </span>
                            </span>
                            <span class="text-secondary small" th:text="${app.reviewCount}">0</span>
                        </div>
                        <div class="text-muted small two-line-clamp mb-3" th:text="${app.subtitle}"></div>
                        <div>
                            <span th:if="${app.price != null and app.price.compareTo(T(java.math.BigDecimal).ZERO) == 0}"
                                  class="btn-get">GET</span>
                            <span th:unless="${app.price != null and app.price.compareTo(T(java.math.BigDecimal).ZERO) == 0}"
                                  class="btn-price" th:text="'$' + ${#numbers.formatDecimal(app.price, 1, 2)}">$4.99</span>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <!-- Empty State -->
        <div th:if="${apps.isEmpty()}" class="text-center py-5">
            <i class="fa-solid fa-magnifying-glass fa-4x text-secondary mb-3"></i>
            <h3>No results found</h3>
            <p class="text-secondary" th:text="'No apps matching &quot;' + ${query} + '&quot;'">Try a different search term.</p>
            <a th:href="@{/browse}" class="btn btn-primary rounded-pill mt-2">Browse All Apps</a>
        </div>

        <!-- Pagination -->
        <nav th:if="${apps.totalPages > 1}" class="d-flex justify-content-center mt-4">
            <ul class="pagination">
                <li class="page-item" th:classappend="${!apps.hasPrevious() ? 'disabled' : ''}">
                    <a class="page-link rounded-pill me-1" th:href="@{/search(q=${query}, page=${apps.number - 1})}">&laquo; Prev</a>
                </li>
                <li th:each="i : ${#numbers.sequence(0, apps.totalPages - 1)}"
                    class="page-item" th:classappend="${apps.number == i ? 'active' : ''}">
                    <a class="page-link rounded-pill mx-1" th:href="@{/search(q=${query}, page=${i})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${!apps.hasNext() ? 'disabled' : ''}">
                    <a class="page-link rounded-pill ms-1" th:href="@{/search(q=${query}, page=${apps.number + 1})}">Next &raquo;</a>
                </li>
            </ul>
        </nav>
    </div>
</main>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
