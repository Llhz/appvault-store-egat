<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('Create Account')"></head>
<body class="auth-page">
<div class="auth-container">
    <div class="auth-card" style="max-width: 480px;">
        <div class="text-center mb-4">
            <i class="fa-solid fa-vault fa-3x text-primary mb-2"></i>
            <h1 class="h3 fw-bold">Create your AppVault account</h1>
        </div>

        <form th:action="@{/auth/register}" method="post" th:object="${user}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Global errors -->
            <div class="alert alert-danger rounded-3" th:if="${#fields.hasGlobalErrors()}"
                 th:errors="*{global}"></div>

            <div class="row mb-3">
                <div class="col">
                    <input type="text" class="form-control form-control-auth" th:field="*{firstName}"
                           placeholder="First Name" required maxlength="50"/>
                    <div class="text-danger small mt-1" th:errors="*{firstName}"></div>
                </div>
                <div class="col">
                    <input type="text" class="form-control form-control-auth" th:field="*{lastName}"
                           placeholder="Last Name" required maxlength="50"/>
                    <div class="text-danger small mt-1" th:errors="*{lastName}"></div>
                </div>
            </div>

            <div class="mb-3">
                <div class="input-group-icon">
                    <i class="fa-solid fa-envelope input-icon"></i>
                    <input type="email" class="form-control form-control-auth" th:field="*{email}"
                           placeholder="Email address" required/>
                </div>
                <div class="text-danger small mt-1" th:errors="*{email}"></div>
            </div>

            <div class="mb-2">
                <div class="input-group-icon">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" class="form-control form-control-auth" id="regPassword"
                           th:field="*{password}" placeholder="Password (min 8 chars)" required minlength="8"
                           oninput="checkPasswordStrength(this.value)"/>
                    <button type="button" class="toggle-password" onclick="togglePassword('regPassword', this)">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
                <div class="password-strength mt-1" id="strengthBar">
                    <div id="strengthFill" class="strength-fill"></div>
                </div>
                <div id="strengthText" class="text-secondary small mt-1"></div>
                <div class="text-danger small mt-1" th:errors="*{password}"></div>
            </div>

            <div class="mb-4">
                <div class="input-group-icon">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" class="form-control form-control-auth" th:field="*{confirmPassword}"
                           placeholder="Confirm Password" required/>
                </div>
                <div class="text-danger small mt-1" th:errors="*{confirmPassword}"></div>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-lg rounded-pill">Create Account</button>
        </form>

        <div class="text-center mt-4">
            <span class="text-secondary">Already have an account? </span>
            <a th:href="@{/auth/login}" class="text-primary fw-semibold">Sign In</a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
