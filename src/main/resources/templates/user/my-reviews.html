<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('My Reviews')"></head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<main style="padding-top: 70px;">
<div class="container py-4" style="max-width: 800px;">
    <div class="d-flex align-items-center gap-3 mb-4">
        <a th:href="@{/user/profile}" class="btn btn-outline-secondary btn-sm rounded-pill">
            <i class="fa-solid fa-arrow-left me-1"></i>Back to Profile
        </a>
        <h1 class="page-title mb-0">My Reviews</h1>
    </div>

    <div th:if="${reviews.isEmpty()}" class="text-center py-5 bg-white rounded-3 shadow-sm">
        <i class="fa-regular fa-comment-dots fa-4x text-secondary mb-3"></i>
        <h3>No reviews yet</h3>
        <p class="text-secondary">Start by reviewing apps you've used.</p>
        <a th:href="@{/browse}" class="btn btn-primary rounded-pill mt-2">Browse Apps</a>
    </div>

    <div th:each="review : ${reviews}" class="review-card mb-3">
        <div class="d-flex gap-3 align-items-start">
            <a th:href="@{/app/{id}(id=${review.appListing.id})}">
                <img th:src="${review.appListing.iconUrl != null ? review.appListing.iconUrl : 'https://placehold.co/56x56/007AFF/white?text=A'}"
                     th:alt="${review.appListing.name}" class="app-icon-sm rounded-3"/>
            </a>
            <div class="flex-grow-1">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <a th:href="@{/app/{id}(id=${review.appListing.id})}" class="fw-semibold text-dark text-decoration-none"
                           th:text="${review.appListing.name}">App</a>
                        <div class="star-rating-sm my-1">
                            <span th:each="i : ${#numbers.sequence(1,5)}">
                                <i class="fa-solid fa-star" th:if="${i <= review.rating}"></i>
                                <i class="fa-regular fa-star" th:unless="${i <= review.rating}"></i>
                            </span>
                        </div>
                    </div>
                    <span class="text-secondary small" th:text="${#temporals.format(review.createdAt, 'MMM d, yyyy')}">Date</span>
                </div>
                <div class="fw-semibold mb-1" th:text="${review.title}">Title</div>
                <p class="text-secondary small mb-2" th:text="${review.content}">Content</p>
                <form th:action="@{/review/{id}/delete(id=${review.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="returnUrl" value="/user/my-reviews"/>
                    <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill"
                            onclick="return confirm('Delete this review?')">
                        <i class="fa-solid fa-trash me-1"></i>Delete Review
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</main>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
