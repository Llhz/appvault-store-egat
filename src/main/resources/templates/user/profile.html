<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('My Profile')"></head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<main style="padding-top: 70px;">
<div class="container py-5" style="max-width: 600px;">
    <div class="bg-white rounded-3 shadow-sm p-4">
        <!-- Avatar -->
        <div class="text-center mb-4">
            <div class="avatar-circle mx-auto mb-3">
                <img th:if="${user.avatarUrl != null and !user.avatarUrl.isEmpty()}"
                     th:src="${user.avatarUrl}" th:alt="${user.fullName}" class="w-100 h-100 rounded-circle object-fit-cover"/>
                <i th:unless="${user.avatarUrl != null and !user.avatarUrl.isEmpty()}"
                   class="fa-solid fa-circle-user fa-5x text-secondary"></i>
            </div>
            <h2 class="fw-bold" th:text="${user.fullName}">User Name</h2>
            <p class="text-secondary" th:text="${user.email}">user@example.com</p>
            <a th:href="@{/user/my-reviews}" class="btn btn-outline-primary btn-sm rounded-pill">
                <i class="fa-solid fa-star me-1"></i>My Reviews
            </a>
        </div>

        <hr/>

        <div class="alert alert-success rounded-3" th:if="${param.saved}">Profile updated successfully!</div>

        <h5 class="fw-semibold mb-3">Edit Profile</h5>
        <form th:action="@{/user/profile}" method="post" th:object="${profileDto}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="row mb-3">
                <div class="col">
                    <label class="form-label fw-semibold">First Name</label>
                    <input type="text" class="form-control rounded-3" th:field="*{firstName}" required maxlength="50"/>
                    <div class="text-danger small mt-1" th:errors="*{firstName}"></div>
                </div>
                <div class="col">
                    <label class="form-label fw-semibold">Last Name</label>
                    <input type="text" class="form-control rounded-3" th:field="*{lastName}" required maxlength="50"/>
                    <div class="text-danger small mt-1" th:errors="*{lastName}"></div>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Avatar URL</label>
                <input type="url" class="form-control rounded-3" th:field="*{avatarUrl}" placeholder="https://..."/>
            </div>

            <button type="submit" class="btn btn-primary rounded-pill px-4">Save Changes</button>
        </form>
    </div>
</div>
</main>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
