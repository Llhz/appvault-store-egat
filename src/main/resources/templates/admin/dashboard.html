<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('Admin Dashboard')"></head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<main style="padding-top: 70px;">
<div class="container py-4">
    <h1 class="page-title mb-4"><i class="fa-solid fa-shield-halved me-2 text-primary"></i>Admin Dashboard</h1>

    <!-- Stats Cards -->
    <div class="row g-3 mb-4">
        <div class="col-sm-6 col-lg-3">
            <div class="stat-card">
                <div class="stat-icon bg-primary-light"><i class="fa-solid fa-rocket text-primary fa-xl"></i></div>
                <div class="stat-value" th:text="${totalApps}">0</div>
                <div class="stat-label">Total Apps</div>
            </div>
        </div>
        <div class="col-sm-6 col-lg-3">
            <div class="stat-card">
                <div class="stat-icon bg-success-light"><i class="fa-solid fa-users text-success fa-xl"></i></div>
                <div class="stat-value" th:text="${totalUsers}">0</div>
                <div class="stat-label">Total Users</div>
            </div>
        </div>
        <div class="col-sm-6 col-lg-3">
            <div class="stat-card">
                <div class="stat-icon bg-warning-light"><i class="fa-solid fa-star text-warning fa-xl"></i></div>
                <div class="stat-value" th:text="${totalReviews}">0</div>
                <div class="stat-label">Total Reviews</div>
            </div>
        </div>
        <div class="col-sm-6 col-lg-3">
            <div class="stat-card">
                <div class="stat-icon bg-info-light"><i class="fa-solid fa-fire text-info fa-xl"></i></div>
                <div class="stat-value" th:text="${featuredApps}">0</div>
                <div class="stat-label">Featured Apps</div>
            </div>
        </div>
    </div>

    <!-- Quick Links -->
    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <a th:href="@{/admin/apps}" class="text-decoration-none">
                <div class="bg-white rounded-3 shadow-sm p-4 d-flex align-items-center gap-3 hover-lift">
                    <div class="stat-icon bg-primary-light"><i class="fa-solid fa-rocket text-primary fa-xl"></i></div>
                    <div>
                        <div class="fw-semibold text-dark">Manage Apps</div>
                        <div class="text-secondary small">Add, edit, delete app listings</div>
                    </div>
                    <i class="fa-solid fa-chevron-right ms-auto text-secondary"></i>
                </div>
            </a>
        </div>
        <div class="col-md-6">
            <a th:href="@{/admin/users}" class="text-decoration-none">
                <div class="bg-white rounded-3 shadow-sm p-4 d-flex align-items-center gap-3 hover-lift">
                    <div class="stat-icon bg-success-light"><i class="fa-solid fa-users text-success fa-xl"></i></div>
                    <div>
                        <div class="fw-semibold text-dark">Manage Users</div>
                        <div class="text-secondary small">View and manage user accounts</div>
                    </div>
                    <i class="fa-solid fa-chevron-right ms-auto text-secondary"></i>
                </div>
            </a>
        </div>
    </div>

    <!-- Recently Added -->
    <div class="bg-white rounded-3 shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-semibold mb-0">Recently Added Apps</h5>
            <a th:href="@{/admin/apps/new}" class="btn btn-primary btn-sm rounded-pill">
                <i class="fa-solid fa-plus me-1"></i>Add New App
            </a>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead><tr><th>App</th><th>Category</th><th>Price</th><th>Rating</th><th>Actions</th></tr></thead>
                <tbody>
                <tr th:each="app : ${recentApps}">
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <img th:src="${app.iconUrl}" th:alt="${app.name}" width="40" height="40" class="rounded-3"/>
                            <span class="fw-semibold" th:text="${app.name}">App</span>
                        </div>
                    </td>
                    <td class="text-secondary" th:text="${app.category != null ? app.category.name : '-'}">Cat</td>
                    <td th:text="${app.price.compareTo(T(java.math.BigDecimal).ZERO) == 0 ? 'Free' : '$' + #numbers.formatDecimal(app.price, 1, 2)}">Free</td>
                    <td>
                        <span class="star-rating-sm">
                            <i class="fa-solid fa-star text-warning"></i>
                        </span>
                        <span th:text="${app.rating}">0</span>
                    </td>
                    <td>
                        <a th:href="@{/admin/apps/{id}/edit(id=${app.id})}" class="btn btn-sm btn-outline-primary rounded-pill me-1">Edit</a>
                        <form th:action="@{/admin/apps/{id}/delete(id=${app.id})}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill"
                                    onclick="return confirm('Delete this app?')">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</main>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
