<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('Admin Dashboard')"></head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<main style="padding-top: 70px;">
<div class="container py-4">
    <h1 class="page-title mb-4"><i class="fa-solid fa-shield-halved me-2 text-primary"></i>Admin Dashboard</h1>

    <!-- Stats Cards -->
    <div class="row g-3 mb-4">
        <div class="col-sm-6 col-lg-3">
            <div class="stat-card">
                <div class="stat-icon bg-primary-light"><i class="fa-solid fa-rocket text-primary fa-xl"></i></div>
                <div class="stat-value" th:text="${totalApps}">0</div>
                <div class="stat-label">Total Apps</div>
            </div>
        </div>
        <div class="col-sm-6 col-lg-3">
            <div class="stat-card">
                <div class="stat-icon bg-success-light"><i class="fa-solid fa-users text-success fa-xl"></i></div>
                <div class="stat-value" th:text="${totalUsers}">0</div>
                <div class="stat-label">Total Users</div>
            </div>
        </div>
        <div class="col-sm-6 col-lg-3">
            <div class="stat-card">
                <div class="stat-icon bg-warning-light"><i class="fa-solid fa-star text-warning fa-xl"></i></div>
                <div class="stat-value" th:text="${totalReviews}">0</div>
                <div class="stat-label">Total Reviews</div>
            </div>
        </div>
        <div class="col-sm-6 col-lg-3">
            <div class="stat-card">
                <div class="stat-icon bg-info-light"><i class="fa-solid fa-fire text-info fa-xl"></i></div>
                <div class="stat-value" th:text="${featuredApps}">0</div>
                <div class="stat-label">Featured Apps</div>
            </div>
        </div>
    </div>

    <!-- Analytics Charts -->
    <div class="row g-3 mb-4">
        <div class="col-lg-6">
            <div class="bg-white rounded-3 shadow-sm p-4">
                <h5 class="fw-semibold mb-3"><i class="fa-solid fa-arrow-down-wide-short me-2 text-primary"></i>Top Downloads</h5>
                <div style="position: relative; height: 300px;">
                    <canvas id="downloadsChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="bg-white rounded-3 shadow-sm p-4">
                <h5 class="fw-semibold mb-3"><i class="fa-solid fa-star-half-stroke me-2 text-warning"></i>Ratings Distribution</h5>
                <div style="position: relative; height: 300px;">
                    <canvas id="ratingsChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-lg-6 mx-auto">
            <div class="bg-white rounded-3 shadow-sm p-4">
                <h5 class="fw-semibold mb-3"><i class="fa-solid fa-layer-group me-2 text-info"></i>Apps by Category</h5>
                <div style="position: relative; height: 300px;">
                    <canvas id="categoriesChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Links -->
    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <a th:href="@{/admin/apps}" class="text-decoration-none">
                <div class="bg-white rounded-3 shadow-sm p-4 d-flex align-items-center gap-3 hover-lift">
                    <div class="stat-icon bg-primary-light"><i class="fa-solid fa-rocket text-primary fa-xl"></i></div>
                    <div>
                        <div class="fw-semibold text-dark">Manage Apps</div>
                        <div class="text-secondary small">Add, edit, delete app listings</div>
                    </div>
                    <i class="fa-solid fa-chevron-right ms-auto text-secondary"></i>
                </div>
            </a>
        </div>
        <div class="col-md-6">
            <a th:href="@{/admin/users}" class="text-decoration-none">
                <div class="bg-white rounded-3 shadow-sm p-4 d-flex align-items-center gap-3 hover-lift">
                    <div class="stat-icon bg-success-light"><i class="fa-solid fa-users text-success fa-xl"></i></div>
                    <div>
                        <div class="fw-semibold text-dark">Manage Users</div>
                        <div class="text-secondary small">View and manage user accounts</div>
                    </div>
                    <i class="fa-solid fa-chevron-right ms-auto text-secondary"></i>
                </div>
            </a>
        </div>
    </div>

    <!-- Recently Added -->
    <div class="bg-white rounded-3 shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-semibold mb-0">Recently Added Apps</h5>
            <a th:href="@{/admin/apps/new}" class="btn btn-primary btn-sm rounded-pill">
                <i class="fa-solid fa-plus me-1"></i>Add New App
            </a>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead><tr><th>App</th><th>Category</th><th>Price</th><th>Rating</th><th>Actions</th></tr></thead>
                <tbody>
                <tr th:each="app : ${recentApps}">
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <img th:src="${app.iconUrl}" th:alt="${app.name}" width="40" height="40" class="rounded-3"/>
                            <span class="fw-semibold" th:text="${app.name}">App</span>
                        </div>
                    </td>
                    <td class="text-secondary" th:text="${app.category != null ? app.category.name : '-'}">Cat</td>
                    <td th:text="${app.price.compareTo(T(java.math.BigDecimal).ZERO) == 0 ? 'Free' : '$' + #numbers.formatDecimal(app.price, 1, 2)}">Free</td>
                    <td>
                        <span class="star-rating-sm">
                            <i class="fa-solid fa-star text-warning"></i>
                        </span>
                        <span th:text="${app.rating}">0</span>
                    </td>
                    <td>
                        <a th:href="@{/admin/apps/{id}/edit(id=${app.id})}" class="btn btn-sm btn-outline-primary rounded-pill me-1">Edit</a>
                        <form th:action="@{/admin/apps/{id}/delete(id=${app.id})}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill"
                                    onclick="return confirm('Delete this app?')">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</main>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
(function() {
    function fetchJson(url) {
        return fetch(url, {
            headers: {
                'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').getAttribute('content')
            }
        }).then(function(res) { return res.json(); });
    }

    // Downloads horizontal bar chart
    fetchJson('/admin/api/stats/downloads').then(function(data) {
        var labels = data.map(function(d) { return d.name; });
        var counts = data.map(function(d) { return d.downloadCount; });
        new Chart(document.getElementById('downloadsChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Downloads',
                    data: counts,
                    backgroundColor: 'rgba(54, 162, 235, 0.7)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1,
                    borderRadius: 4
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(ctx) { return ctx.parsed.x.toLocaleString() + ' downloads'; }
                        }
                    }
                },
                scales: {
                    x: { beginAtZero: true, ticks: { callback: function(v) { return v.toLocaleString(); } } }
                }
            }
        });
    });

    // Ratings distribution donut chart
    fetchJson('/admin/api/stats/ratings').then(function(data) {
        var labels = data.map(function(d) { return d.rating + ' Star' + (d.rating > 1 ? 's' : ''); });
        var counts = data.map(function(d) { return d.count; });
        var colors = ['#dc3545', '#fd7e14', '#ffc107', '#a3d977', '#28a745'];
        new Chart(document.getElementById('ratingsChart'), {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: counts,
                    backgroundColor: colors,
                    borderWidth: 2,
                    borderColor: '#fff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'right' },
                    tooltip: {
                        callbacks: {
                            label: function(ctx) {
                                var total = ctx.dataset.data.reduce(function(a, b) { return a + b; }, 0);
                                var pct = total > 0 ? Math.round(ctx.parsed / total * 100) : 0;
                                return ctx.label + ': ' + ctx.parsed + ' (' + pct + '%)';
                            }
                        }
                    }
                }
            }
        });
    });

    // Categories donut chart
    fetchJson('/admin/api/stats/categories').then(function(data) {
        var labels = data.map(function(d) { return d.category; });
        var counts = data.map(function(d) { return d.count; });
        var palette = ['#4dc9f6','#f67019','#f53794','#537bc4','#acc236','#166a8f','#00a950','#58595b','#8549ba','#e6194b'];
        new Chart(document.getElementById('categoriesChart'), {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: counts,
                    backgroundColor: palette.slice(0, labels.length),
                    borderWidth: 2,
                    borderColor: '#fff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'right' },
                    tooltip: {
                        callbacks: {
                            label: function(ctx) {
                                var total = ctx.dataset.data.reduce(function(a, b) { return a + b; }, 0);
                                var pct = total > 0 ? Math.round(ctx.parsed / total * 100) : 0;
                                return ctx.label + ': ' + ctx.parsed + ' apps (' + pct + '%)';
                            }
                        }
                    }
                }
            }
        });
    });
})();
</script>
</body>
</html>
