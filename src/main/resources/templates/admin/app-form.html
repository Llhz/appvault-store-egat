<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head(${appId != null ? 'Edit App' : 'New App'})"></head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<main style="padding-top: 70px;">
<div class="container py-4" style="max-width: 800px;">
    <div class="d-flex align-items-center gap-3 mb-4">
        <a th:href="@{/admin/apps}" class="btn btn-outline-secondary btn-sm rounded-pill">
            <i class="fa-solid fa-arrow-left me-1"></i>Back
        </a>
        <h1 class="page-title mb-0" th:text="${appId != null ? 'Edit App' : 'Add New App'}">App Form</h1>
    </div>

    <div class="bg-white rounded-3 shadow-sm p-4">
        <form th:action="${appId != null ? '/admin/apps/' + appId : '/admin/apps'}" method="post" th:object="${appDto}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="row mb-3">
                <div class="col-md-8">
                    <label class="form-label fw-semibold">App Name *</label>
                    <input type="text" class="form-control rounded-3" th:field="*{name}" required maxlength="100"/>
                    <div class="text-danger small mt-1" th:errors="*{name}"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Category</label>
                    <select class="form-select rounded-3" th:field="*{categoryId}">
                        <option value="">— None —</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">Cat</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Subtitle</label>
                <input type="text" class="form-control rounded-3" th:field="*{subtitle}" maxlength="200"/>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Description *</label>
                <textarea class="form-control rounded-3" th:field="*{description}" rows="6" required maxlength="5000"></textarea>
                <div class="text-danger small mt-1" th:errors="*{description}"></div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Developer *</label>
                    <input type="text" class="form-control rounded-3" th:field="*{developer}" required/>
                    <div class="text-danger small mt-1" th:errors="*{developer}"></div>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Version</label>
                    <input type="text" class="form-control rounded-3" th:field="*{version}" placeholder="1.0.0"/>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Size</label>
                    <input type="text" class="form-control rounded-3" th:field="*{size}" placeholder="25 MB"/>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Icon URL</label>
                    <input type="url" class="form-control rounded-3" th:field="*{iconUrl}" placeholder="https://..."/>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Header Image URL</label>
                    <input type="url" class="form-control rounded-3" th:field="*{headerImageUrl}" placeholder="https://..."/>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Price ($)</label>
                    <input type="number" class="form-control rounded-3" th:field="*{price}" step="0.01" min="0" placeholder="0.00"/>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Age Rating</label>
                    <select class="form-select rounded-3" th:field="*{ageRating}">
                        <option value="">— Select —</option>
                        <option value="4+">4+</option>
                        <option value="9+">9+</option>
                        <option value="12+">12+</option>
                        <option value="17+">17+</option>
                    </select>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <div class="form-check mb-3">
                        <input type="checkbox" class="form-check-input" th:field="*{featured}" id="featuredCheck"/>
                        <label class="form-check-label fw-semibold" for="featuredCheck">Featured App</label>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Compatibility</label>
                <input type="text" class="form-control rounded-3" th:field="*{compatibility}" placeholder="iOS 14+, macOS 11+"/>
            </div>

            <!-- Screenshots -->
            <div class="mb-4">
                <label class="form-label fw-semibold">Screenshots</label>
                <div id="screenshotFields">
                    <div class="row mb-2 screenshot-row">
                        <div class="col-8">
                            <input type="url" class="form-control rounded-3" name="screenshotUrls" placeholder="Screenshot URL"/>
                        </div>
                        <div class="col-3">
                            <input type="text" class="form-control rounded-3" name="screenshotCaptions" placeholder="Caption (optional)"/>
                        </div>
                        <div class="col-1 d-flex align-items-center">
                            <button type="button" class="btn btn-outline-danger btn-sm rounded-circle" onclick="removeRow(this)">
                                <i class="fa-solid fa-minus"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill mt-2" onclick="addScreenshotRow()">
                    <i class="fa-solid fa-plus me-1"></i>Add Screenshot
                </button>
            </div>

            <div class="d-flex gap-3">
                <button type="submit" class="btn btn-primary rounded-pill px-5">
                    <i class="fa-solid fa-save me-2"></i>Save App
                </button>
                <a th:href="@{/admin/apps}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
            </div>
        </form>
    </div>
</div>
</main>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
