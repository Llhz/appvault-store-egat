<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('Manage Apps')"></head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<main style="padding-top: 70px;">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="page-title">Manage Apps</h1>
        <a th:href="@{/admin/apps/new}" class="btn btn-primary rounded-pill">
            <i class="fa-solid fa-plus me-2"></i>Add New App
        </a>
    </div>

    <div class="bg-white rounded-3 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th class="ps-4">App</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Rating</th>
                    <th>Downloads</th>
                    <th>Featured</th>
                    <th class="text-end pe-4">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="app : ${apps}">
                    <td class="ps-4">
                        <div class="d-flex align-items-center gap-3">
                            <img th:src="${app.iconUrl}" th:alt="${app.name}" width="48" height="48" class="rounded-3"/>
                            <div>
                                <div class="fw-semibold" th:text="${app.name}">App</div>
                                <div class="text-secondary small" th:text="${app.developer}">Dev</div>
                            </div>
                        </div>
                    </td>
                    <td class="text-secondary" th:text="${app.category != null ? app.category.name : '-'}">Cat</td>
                    <td th:text="${app.price.compareTo(T(java.math.BigDecimal).ZERO) == 0 ? 'Free' : '$' + #numbers.formatDecimal(app.price, 1, 2)}">Free</td>
                    <td>
                        <i class="fa-solid fa-star text-warning me-1"></i>
                        <span th:text="${app.rating}">0</span>
                    </td>
                    <td th:text="${#numbers.formatInteger(app.downloadCount, 1, 'COMMA')}">0</td>
                    <td>
                        <span th:if="${app.featured}" class="badge bg-success rounded-pill">Featured</span>
                        <span th:unless="${app.featured}" class="badge bg-secondary rounded-pill">No</span>
                    </td>
                    <td class="text-end pe-4">
                        <a th:href="@{/app/{id}(id=${app.id})}" class="btn btn-sm btn-outline-secondary rounded-pill me-1" target="_blank">View</a>
                        <a th:href="@{/admin/apps/{id}/edit(id=${app.id})}" class="btn btn-sm btn-outline-primary rounded-pill me-1">Edit</a>
                        <form th:action="@{/admin/apps/{id}/delete(id=${app.id})}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill"
                                    onclick="return confirm('Delete this app? This cannot be undone.')">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</main>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
