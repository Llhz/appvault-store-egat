<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('Manage Users')"></head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<main style="padding-top: 70px;">
<div class="container py-4">
    <div class="d-flex align-items-center gap-3 mb-4">
        <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary btn-sm rounded-pill">
            <i class="fa-solid fa-arrow-left me-1"></i>Dashboard
        </a>
        <h1 class="page-title mb-0">Manage Users</h1>
    </div>

    <div class="bg-white rounded-3 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th class="ps-4">User</th>
                    <th>Email</th>
                    <th>Roles</th>
                    <th>Status</th>
                    <th>Registered</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td class="ps-4">
                        <div class="d-flex align-items-center gap-2">
                            <div class="avatar-circle-sm">
                                <i class="fa-solid fa-circle-user fa-2x text-secondary"></i>
                            </div>
                            <span class="fw-semibold" th:text="${u.fullName}">Name</span>
                        </div>
                    </td>
                    <td class="text-secondary" th:text="${u.email}">email</td>
                    <td>
                        <span th:each="role : ${u.roles}"
                              th:class="${role.name == 'ROLE_ADMIN' ? 'badge bg-danger rounded-pill me-1' : 'badge bg-secondary rounded-pill me-1'}"
                              th:text="${role.name.replace('ROLE_', '')}">USER</span>
                    </td>
                    <td>
                        <span th:if="${u.enabled}" class="badge bg-success rounded-pill">Active</span>
                        <span th:unless="${u.enabled}" class="badge bg-danger rounded-pill">Disabled</span>
                    </td>
                    <td class="text-secondary" th:text="${#temporals.format(u.createdAt, 'MMM d, yyyy')}">Date</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</main>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
