<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('Access Denied')"></head>
<body class="auth-page">
<div class="auth-container">
    <div class="auth-card text-center">
        <div class="mb-4">
            <i class="fa-solid fa-ban fa-5x text-danger mb-3"></i>
            <h1 class="display-4 fw-bold text-danger">403</h1>
            <h2 class="fw-semibold mb-3">Access Denied</h2>
            <p class="text-secondary" th:if="${errorMessage}" th:text="${errorMessage}">You don't have permission to access this page.</p>
            <p class="text-secondary" th:unless="${errorMessage}">You don't have permission to access this page.</p>
        </div>
        <a href="/" class="btn btn-primary rounded-pill px-5 me-2">Go to Home</a>
        <a href="/auth/login" class="btn btn-outline-primary rounded-pill px-5">Sign In</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
