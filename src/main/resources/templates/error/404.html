<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('Page Not Found')"></head>
<body class="auth-page">
<div class="auth-container">
    <div class="auth-card text-center">
        <div class="mb-4">
            <i class="fa-solid fa-circle-question fa-5x text-secondary mb-3"></i>
            <h1 class="display-4 fw-bold text-primary">404</h1>
            <h2 class="fw-semibold mb-3">Page Not Found</h2>
            <p class="text-secondary" th:if="${errorMessage}" th:text="${errorMessage}">The page you are looking for does not exist.</p>
            <p class="text-secondary" th:unless="${errorMessage}">The page you are looking for does not exist.</p>
        </div>
        <a href="/" class="btn btn-primary rounded-pill px-5">Go to Home</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
