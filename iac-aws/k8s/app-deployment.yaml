apiVersion: v1
kind: Namespace
metadata:
  name: appvault
  labels:
    app.kubernetes.io/part-of: appvault-store
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: appvault-store
  namespace: appvault
  annotations:
    eks.amazonaws.com/role-arn: "${APP_IRSA_ROLE_ARN}"
  labels:
    app.kubernetes.io/name: appvault-store
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: appvault-secrets
  namespace: appvault
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "${SECRET_ADMIN_PASSWORD_ARN}"
        objectType: "secretsmanager"
      - objectName: "${SECRET_SPRING_PROFILES_ARN}"
        objectType: "secretsmanager"
  secretObjects:
    - secretName: appvault-secrets
      type: Opaque
      data:
        - objectName: "${SECRET_ADMIN_PASSWORD_ARN}"
          key: ADMIN_PASSWORD
        - objectName: "${SECRET_SPRING_PROFILES_ARN}"
          key: SPRING_PROFILES_ACTIVE
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: appvault-store
  namespace: appvault
  labels:
    app.kubernetes.io/name: appvault-store
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: appvault-store
  template:
    metadata:
      labels:
        app.kubernetes.io/name: appvault-store
    spec:
      serviceAccountName: appvault-store
      containers:
        - name: appvault-store
          image: "${ECR_REPOSITORY_URL}:latest"
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                secretKeyRef:
                  name: appvault-secrets
                  key: SPRING_PROFILES_ACTIVE
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: appvault-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: appvault-store
  namespace: appvault
  labels:
    app.kubernetes.io/name: appvault-store
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: appvault-store
